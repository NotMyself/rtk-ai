name: Windows Build

on:
  push:
    branches: [fork/nme-rtk-ai]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Windows x86_64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Lint
        run: |
          cargo fmt --all --check
          cargo clippy --all-targets -- -D warnings -A dead_code -A unused -A clippy::too_many_arguments -A clippy::type_complexity -A clippy::collapsible_else_if -A clippy::needless_borrow -A clippy::needless_range_loop -A clippy::useless_format -A clippy::same_item_push -A clippy::option_as_ref_deref -A clippy::double_ended_iterator_last -A clippy::unnecessary_map_or -A clippy::trim_split_whitespace -A clippy::obfuscated_if_else -A clippy::derivable_impls -A clippy::bool_assert_comparison

      - name: Test
        run: cargo test --all

      - name: Build release
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Package
        run: |
          cd target/x86_64-pc-windows-msvc/release
          7z a ../../../rtk-x86_64-pc-windows-msvc.zip rtk.exe
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rtk-x86_64-pc-windows-msvc
          path: rtk-x86_64-pc-windows-msvc.zip

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAG="v${VERSION}-nme.${SHORT_SHA}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: rtk-x86_64-pc-windows-msvc
          path: release

      - name: Create checksums
        run: |
          cd release
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "rtk ${{ steps.version.outputs.version }} (Windows, ${{ steps.version.outputs.tag }})"
          body: |
            Windows build of rtk (Rust Token Killer) from fork branch `fork/nme-rtk-ai`.

            Includes:
            - Upstream rtk v${{ steps.version.outputs.version }}
            - dotnet support (PR #172): `rtk dotnet build/test/restore/format`
            - Windows CRLF fix for binlog duration parsing
            - Debug stack overflow fix for Windows

            **Install:** Download `rtk-x86_64-pc-windows-msvc.zip`, extract `rtk.exe`, add to PATH.
          files: release/*
          prerelease: true
          target_commitish: ${{ github.sha }}
